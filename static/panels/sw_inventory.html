<script>
/* SWINV_QUIET_INTERNAL_WARNINGS_V13
   Quiet only SW Inventory internal shield warnings.
   Does not hide real SyntaxError/API/runtime errors.
*/
(function(){
  if (window.__SWINV_QUIET_INTERNAL_WARNINGS_V13__) return;
  window.__SWINV_QUIET_INTERNAL_WARNINGS_V13__ = true;

  var realWarn = console.warn ? console.warn.bind(console) : function(){};
  var realDebug = console.debug ? console.debug.bind(console) : console.log.bind(console);

  console.warn = function(){
    var first = String(arguments[0] || '');
    if (
      first.indexOf('[SWINV_SAFE_WRAPPERS_V10]') >= 0 ||
      first.indexOf('[SWINV_FINAL_DOM_SHIELD_V11]') >= 0
    ) {
      return realDebug.apply(console, arguments);
    }
    return realWarn.apply(console, arguments);
  };

  console.log('[SWINV_QUIET_INTERNAL_WARNINGS_V13] installed');
})();
</script>


<script>
/* SWINV_AUTH_GUARD_V2
   Product-safe fix:
   - Do NOT bypass auth.
   - Prevent SW Inventory from firing protected API calls while visible login overlay is active.
   - If user opens panel directly before login, show login-required state instead of noisy blocked fetches.
*/
(function(){
  if (window.__SWINV_AUTH_GUARD_V2__) return;
  window.__SWINV_AUTH_GUARD_V2__ = true;

  function hasToken(){
    try {
      const keys = [
        'vsp_token','token','access_token','auth_token','jwt',
        'VSP_TOKEN','VSP_ACCESS_TOKEN'
      ];
      for (const k of keys) {
        const v = localStorage.getItem(k) || sessionStorage.getItem(k);
        if (v && String(v).length > 10) return true;
      }

      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        const v = localStorage.getItem(k) || '';
        if (/token|jwt|auth/i.test(k) && v.length > 10) return true;
      }
    } catch(e) {}
    return false;
  }

  function loginVisible(){
    const selectors = [
      '#login-screen',
      '#login-modal',
      '.login-screen',
      '.login-modal',
      '.auth-screen',
      '[data-login]',
      '[data-auth="login"]'
    ];

    for (const sel of selectors) {
      const el = document.querySelector(sel);
      if (!el) continue;
      const st = getComputedStyle(el);
      const r = el.getBoundingClientRect();
      if (
        st.display !== 'none' &&
        st.visibility !== 'hidden' &&
        Number(st.opacity || 1) > 0.05 &&
        r.width > 20 &&
        r.height > 20
      ) {
        return true;
      }
    }

    return false;
  }

  function authReady(){
    return hasToken() && !loginVisible();
  }

  function renderLoginRequired(){
    const ids = [
      'inv-tbody',
      'license-tbody',
      'crack-tbody',
      'scan-history-tbody',
      'policy-body'
    ];

    for (const id of ids) {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = '<tr><td colspan="12" class="empty">Login required — open VSP shell, sign in, then reopen SW Inventory.</td></tr>';
      }
    }

    const status = document.getElementById('sw-status') || document.getElementById('inv-pager-info');
    if (status) status.textContent = 'AUTH REQUIRED';
  }

  const realFetch = window.fetch ? window.fetch.bind(window) : null;

  if (realFetch) {
    window.fetch = function(input, init){
      const url = String(typeof input === 'string' ? input : (input && input.url) || '');
      if (/\/api\/v1\/software-inventory/.test(url) && !authReady()) {
        console.warn('[SWINV-AUTH-GUARD-V2] deferred protected API until auth ready:', url);
        renderLoginRequired();
        return Promise.resolve(new Response(JSON.stringify({
          ok:false,
          deferred:true,
          reason:'auth_not_ready'
        }), {
          status: 401,
          headers: {'Content-Type':'application/json'}
        }));
      }
      return realFetch(input, init);
    };
  }

  window.SWINV_AUTH_READY_V2 = authReady;

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      if (!authReady()) renderLoginRequired();
    }, 50);
  });
})();
</script>


<script>
/* P8921_V11_FIX_GUARD_ALLOW_VISIBLE_DASHBOARD
   Final guard rule:
   - Auth/status/login/logout always allowed.
   - If a real visible Dashboard shell is visible, allow protected API.
   - If a real visible login form is visible AND Dashboard shell is not visible, block protected API.
   - Hidden login DOM must not block authenticated Dashboard.
*/
(function(){
  if (window.__P8921_V11_FIX_GUARD_ALLOW_VISIBLE_DASHBOARD__) return;
  window.__P8921_V11_FIX_GUARD_ALLOW_VISIBLE_DASHBOARD__ = true;

  function norm(u){
    u = String(u || '');
    try {
      if (u.indexOf('http://') === 0 || u.indexOf('https://') === 0) {
        var x = new URL(u);
        return x.pathname + x.search;
      }
    } catch(e) {}
    return u;
  }

  function pathOf(input){
    try { return norm(typeof input === 'string' ? input : ((input && input.url) || '')); }
    catch(e) { return ''; }
  }

  function isReallyVisible(el){
    try {
      if (!el) return false;

      var cur = el;
      while (cur && cur.nodeType === 1) {
        var st = window.getComputedStyle(cur);
        if (!st || st.display === 'none' || st.visibility === 'hidden' || Number(st.opacity) === 0) return false;
        if (cur.hidden) return false;
        cur = cur.parentElement;
      }

      var r = el.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return false;
      if (r.bottom <= 0 || r.right <= 0) return false;
      if (r.top >= window.innerHeight || r.left >= window.innerWidth) return false;

      return true;
    } catch(e) {
      return false;
    }
  }

  function textOf(doc){
    try { return ((doc.body && doc.body.innerText) || '').toLowerCase(); }
    catch(e) { return ''; }
  }

  function visibleDashboardIn(doc){
    try {
      var candidates = [
        '#panel-dashboard',
        '[data-panel="dashboard"]',
        '.nav-item.active',
        '.sidebar',
        '.app-sidebar',
        '.topbar',
        '.kpi',
        '#d-score',
        '#d-critical',
        '#d-high',
        '#d-medium',
        '#d-low'
      ];

      var visibleHits = 0;
      for (var i = 0; i < candidates.length; i++) {
        var els = Array.prototype.slice.call(doc.querySelectorAll(candidates[i]));
        if (els.some(isReallyVisible)) visibleHits++;
      }

      var txt = textOf(doc);
      var textHit =
        txt.indexOf('dashboard') >= 0 &&
        txt.indexOf('scan log') >= 0 &&
        txt.indexOf('findings') >= 0 &&
        txt.indexOf('remediation') >= 0;

      var adminHit = txt.indexOf('admin@vsp.local') >= 0 || txt.indexOf('unclass') >= 0;

      return visibleHits >= 2 || (textHit && adminHit);
    } catch(e) {
      return false;
    }
  }

  function visibleLoginIn(doc){
    try {
      if (visibleDashboardIn(doc)) return false;

      var pwds = Array.prototype.slice.call(doc.querySelectorAll('input[type="password"]'));
      var visiblePwd = pwds.some(isReallyVisible);
      if (!visiblePwd) return false;

      var txt = textOf(doc);
      var hasLoginText =
        txt.indexOf('authenticate') >= 0 ||
        txt.indexOf('consent notice') >= 0 ||
        txt.indexOf('u.s. government warning') >= 0 ||
        txt.indexOf('password') >= 0;

      return visiblePwd && hasLoginText;
    } catch(e) {
      return false;
    }
  }

  function parentVisibleDashboard(){
    try {
      if (window.parent && window.parent !== window && window.parent.document) {
        return visibleDashboardIn(window.parent.document);
      }
    } catch(e) {}
    return false;
  }

  function parentVisibleLogin(){
    try {
      if (window.parent && window.parent !== window && window.parent.document) {
        return visibleLoginIn(window.parent.document);
      }
    } catch(e) {}
    return false;
  }

  function publicApi(path){
    return (
      path.indexOf('/api/v1/status') === 0 ||
      path.indexOf('/api/v1/auth/login') === 0 ||
      path.indexOf('/api/v1/auth/logout') === 0 ||
      path.indexOf('/api/auth/login') === 0 ||
      path.indexOf('/api/auth/logout') === 0 ||
      path.indexOf('/api/login') === 0 ||
      path.indexOf('/api/logout') === 0 ||
      path.indexOf('/api/health') === 0 ||
      path.indexOf('/health') === 0
    );
  }

  function protectedApi(path){
    return (
      path.indexOf('/api/v1/') === 0 ||
      path.indexOf('/api/p4/') === 0
    ) && !publicApi(path);
  }

  function shouldBlockProtected(){
    // IMPORTANT: dashboard wins over hidden login DOM.
    if (visibleDashboardIn(document)) return false;
    if (parentVisibleDashboard()) return false;

    if (visibleLoginIn(document)) return true;
    if (parentVisibleLogin()) return true;

    if (document.readyState === 'loading') return true;

    var p = String(location.pathname || '');
    if (p.indexOf('/panels/') >= 0 || p.endsWith('.html')) return true;

    return false;
  }

  function fake(path){
    return new Response(JSON.stringify({
      skipped: true,
      reason: 'visible_login_guard',
      url: path,
      guard: 'P8921_V11_FIX_GUARD_ALLOW_VISIBLE_DASHBOARD'
    }), {
      status: 200,
      headers: {'Content-Type':'application/json'}
    });
  }

  var nativeFetch = window.fetch;
  if (nativeFetch && !nativeFetch.__p8921_v11) {
    window.fetch = function(input, init){
      var path = pathOf(input);
      if (protectedApi(path) && shouldBlockProtected()) {
        console.warn('[VSP-V11] block protected API while visible login is active:', path);
        return Promise.resolve(fake(path));
      }
      init = init || {};
      init.credentials = init.credentials || 'include';
      return nativeFetch(input, init);
    };
    window.fetch.__p8921_v11 = true;
  }

  var NativeXHR = window.XMLHttpRequest;
  if (NativeXHR && !window.__P8921_V11_XHR__) {
    window.__P8921_V11_XHR__ = true;
    window.XMLHttpRequest = function(){
      var xhr = new NativeXHR();
      var open = xhr.open;
      var send = xhr.send;
      var url = '';

      xhr.open = function(method, u){
        url = norm(u);
        return open.apply(xhr, arguments);
      };

      xhr.send = function(){
        if (protectedApi(url) && shouldBlockProtected()) {
          console.warn('[VSP-V11] block XHR while visible login is active:', url);
          var body = JSON.stringify({skipped:true, reason:'visible_login_guard', url:url});
          try {
            Object.defineProperty(xhr, 'readyState', {value:4, configurable:true});
            Object.defineProperty(xhr, 'status', {value:200, configurable:true});
            Object.defineProperty(xhr, 'responseText', {value:body, configurable:true});
            Object.defineProperty(xhr, 'response', {value:body, configurable:true});
            if (typeof xhr.onreadystatechange === 'function') xhr.onreadystatechange();
            if (typeof xhr.onload === 'function') xhr.onload();
          } catch(e) {}
          return;
        }
        return send.apply(xhr, arguments);
      };

      return xhr;
    };
  }

  window.__vspAuthDebug = function(){
    return {
      visibleLogin: visibleLoginIn(document),
      visibleDashboard: visibleDashboardIn(document),
      parentVisibleLogin: parentVisibleLogin(),
      parentVisibleDashboard: parentVisibleDashboard(),
      shouldBlockProtected: shouldBlockProtected(),
      readyState: document.readyState,
      path: location.pathname,
      guard: 'P8921_V11_FIX_GUARD_ALLOW_VISIBLE_DASHBOARD'
    };
  };
})();
</script>



















<script>
/* Replacement guard for sw_inventory.html — wait properly for parent token */
(function () {
  if (window.__VSP_SWINV_GUARD_V2__) return;
  window.__VSP_SWINV_GUARD_V2__ = true;

  var _origFetch = window.fetch;

  // Get token from multiple sources, with retry
  async function getToken(maxWaitMs) {
    maxWaitMs = maxWaitMs || 10000; // 10s instead of 2.5s
    var deadline = Date.now() + maxWaitMs;
    var firstWarn = true;

    while (Date.now() < deadline) {
      // 1. Try parent window
      try {
        if (window.parent && window.parent !== window && window.parent.TOKEN) return window.parent.TOKEN;
      } catch (e) {} // cross-origin

      // 2. Try this window
      if (window.TOKEN) return window.TOKEN;

      // 3. Try localStorage (multiple keys)
      try {
        var t = localStorage.getItem('vsp_token') || localStorage.getItem('TOKEN') || localStorage.getItem('token');
        if (t) return t;
        // Try parent localStorage
        if (window.parent && window.parent.localStorage) {
          t = window.parent.localStorage.getItem('vsp_token') || window.parent.localStorage.getItem('TOKEN');
          if (t) return t;
        }
      } catch (e) {}

      // 4. Try sessionStorage
      try {
        var ts = sessionStorage.getItem('vsp_token') || sessionStorage.getItem('TOKEN');
        if (ts) return ts;
      } catch (e) {}

      // Quiet wait — only warn once after 3s
      if (firstWarn && (Date.now() - (deadline - maxWaitMs)) > 3000) {
        (window.VSP_DEBUG && console.info('[VSP guard] waiting for parent token…'));
        firstWarn = false;
      }
      await new Promise(r => setTimeout(r, 250));
    }
    return '';
  }

  window.vspAuthFetch = async function (url, opts) {
    opts = opts || {};
    var tk = await getToken();
    if (tk) {
      opts.headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + tk });
    } else if (!/\/api\/v1\/auth\/(check|refresh|login|logout|sso\/)/.test(url)) {
      // Quiet final warning — but only for endpoints that REQUIRE a
      // Bearer token. The /auth/* bootstrap endpoints rely on the
      // session cookie (sent via credentials:'include') so they're
      // not really missing a token, they don't need one.
      console.warn('[VSP guard v2] no token after 10s — request may fail:', url);
    }
    return _origFetch(url, opts);
  };

  window.fetch = function (url, opts) {
    if (typeof url === 'string' && url.indexOf('/api/') >= 0) {
      if (opts && opts.headers && (opts.headers.Authorization || opts.headers.authorization)) {
        return _origFetch(url, opts);
      }
      return window.vspAuthFetch(url, opts);
    }
    return _origFetch(url, opts);
  };

  (window.VSP_DEBUG && console.log('[VSP-SWINV-GUARD v2] Active — 10s timeout, multi-source token lookup'));
})();

</script>

<script>
/* VSP auth fetch guard v2 — polling retry */
(function(){
  if (window.vspAuthFetch && window.vspAuthFetchVersion === 2) return;
  window.vspAuthFetchVersion = 2;
  
  async function getToken(maxWait){
    maxWait = maxWait || 2500;
    var waited = 0;
    var interval = 100;
    while (waited < maxWait) {
      // Check iframe
      var tk = window.TOKEN || localStorage.getItem("vsp_token") || "";
      if (tk && tk.length >= 20) return tk;
      // Check parent (same-origin)
      try {
        tk = window.parent.TOKEN || window.parent.localStorage.getItem("vsp_token") || "";
        if (tk && tk.length >= 20) {
          window.TOKEN = tk;
          try { localStorage.setItem("vsp_token", tk); } catch(e){}
          return tk;
        }
      } catch(e) { /* cross-origin */ }
      // Check top-level (if nested iframes)
      try {
        tk = window.top.TOKEN || "";
        if (tk && tk.length >= 20) {
          window.TOKEN = tk;
          return tk;
        }
      } catch(e) {}
      // Wait & retry
      await new Promise(function(r){setTimeout(r, interval);});
      waited += interval;
    }
    return "";
  }
  
  window.vspAuthFetch = async function(url, opts){
    opts = opts || {};
    var tk = await getToken();
    if (tk) {
      opts.headers = Object.assign({}, opts.headers||{}, {"Authorization":"Bearer "+tk});
    } else {
      if (!/\/api\/v1\/auth\/(check|refresh|login|logout|sso\/)/.test(url)) console.warn("[VSP guard] no token after 2.5s:", url);
    }
    return _origFetch(url, opts);
  };
  
  var _origFetch = window.fetch;
  // Endpoints that BOOTSTRAP the auth state — they're the source of
  // the token, not consumers. Wrapping them in vspAuthFetch causes a
  // 2.5s wait + console warn + fallback fetch *without* Bearer, even
  // though these endpoints rely on the session cookie (sent by the
  // browser automatically via credentials:'include' below).
  var AUTH_BOOTSTRAP_PATHS = ["/api/v1/auth/check", "/api/v1/auth/refresh",
                              "/api/v1/auth/login", "/api/v1/auth/logout",
                              "/api/v1/auth/sso/"];
  function isAuthBootstrap(u) {
    if (typeof u !== "string") return false;
    for (var i = 0; i < AUTH_BOOTSTRAP_PATHS.length; i++) {
      if (u.indexOf(AUTH_BOOTSTRAP_PATHS[i]) >= 0) return true;
    }
    return false;
  }
  window.fetch = function(url, opts){
    if (typeof url === "string" && url.indexOf("/api/") >= 0) {
      if (opts && opts.headers && (opts.headers.Authorization || opts.headers.authorization)) {
        return _origFetch(url, opts);
      }
      // Skip the guard for auth-bootstrap endpoints — they're the
      // source of the token, not a consumer. Pass through directly so
      // the session cookie (credentials:'include' at call site) does
      // the auth, and no noisy "no token after 2.5s" warns fire.
      if (isAuthBootstrap(url)) {
        return _origFetch(url, opts);
      }
      return window.vspAuthFetch(url, opts);
    }
    return _origFetch(url, opts);
  };
})();
</script>

.policy-item.blocked{border-left:3px solid var(--red)}
.policy-item.warning{border-left:3px solid var(--amber)}
.policy-name{font-size:12px;font-weight:600;flex:1}
.policy-meta{font-size:10px;color:var(--t3);font-family:var(--font-mono)}
.policy-actions{display:flex;gap:6px;align-items:center}

/* ── Policy row ── */
.pol-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:var(--r-md);border:1px solid var(--border)}

/* ── Switch ── */
.sw-wrap{position:relative;width:32px;height:18px;flex-shrink:0}
.sw-wrap input{opacity:0;position:absolute;inset:0;cursor:pointer;margin:0}
.sw-track{position:absolute;inset:0;background:var(--bg4);border-radius:9px;transition:background .2s;pointer-events:none}
.sw-thumb{position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--t3);border-radius:50%;transition:transform .2s,background .2s;pointer-events:none}
.sw-wrap input:checked~.sw-track{background:var(--green)}
.sw-wrap input:checked~.sw-thumb{transform:translateX(14px);background:#fff}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);width:min(560px,95vw);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-size:14px;font-weight:700}
.modal-sub{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--font-mono)}
.modal-body{padding:16px 18px}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);font-family:var(--font-mono);display:block;margin-bottom:4px}
.form-ctrl{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:7px 10px;font-size:12px;color:var(--t1);outline:none;font-family:var(--font-ui)}
.form-ctrl:focus{border-color:var(--border2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Progress bar ── */
.pbar-wrap{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden;flex:1}
.pbar{height:100%;border-radius:3px;transition:width .4s}

/* ── Highlight row ── */
.row-danger td{background:rgba(239,68,68,.04)}
.row-warn td{background:rgba(245,158,11,.04)}

/* ── Empty state ── */
.empty{padding:32px;text-align:center;color:var(--t3);font-size:12px;font-family:var(--font-mono)}

/* ── Hash result ── */
.hash-result{font-family:var(--font-mono);font-size:10px;padding:10px;background:var(--bg3);border-radius:var(--r-md);border:1px solid var(--border);word-break:break-all}
.result-ok{color:var(--green)}.result-bad{color:var(--red)}.result-warn{color:var(--amber)}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px}
.stat-lbl{font-size:10px;color:var(--t3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.stat-val{font-family:var(--font-display);font-size:18px;font-weight:800}

/* ── Pagination ── */
.pager{display:flex;align-items:center;gap:6px;padding:8px 10px;border-top:1px solid var(--border);font-size:10px;color:var(--t3);font-family:var(--font-mono)}
.pager-info{margin-right:auto}

.swinv-shimmer{display:inline-block;min-width:32px;background:linear-gradient(90deg,var(--surface,#1e2128) 0%,var(--border,rgba(255,255,255,.07)) 50%,var(--surface,#1e2128) 100%);background-size:200% 100%;animation:vsp-uxs-shimmer 1.2s ease-in-out infinite;color:transparent!important;border-radius:3px;padding:0 4px}
</style>
<script src="/static/js/vsp_uxstates.js"><\/script>
</head>
<body>

<!-- ═══════════════════════════════════
     HEADER + KPI ROW
═══════════════════════════════════ -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
  <div>
    <div style="font-family:var(--font-display);font-size:16px;font-weight:800">Software Inventory</div>
    <div style="font-size:10px;color:var(--t3);font-family:var(--font-mono)">Whitelist · Blacklist · Crack/Pirate detect · Shadow IT · License</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="runSwScan()">⟳ Run SW Scan</button>
    <button class="btn" onclick="exportSwReport()">↓ Export CSV</button>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi" onclick="switchTab('tab-inventory')">
    <div class="kpi-label">Total SW</div>
    <div class="kpi-val c-cyan" id="k-total">—</div>
    <div class="kpi-sub">installed packages</div>
  </div>
  <div class="kpi" onclick="switchTab('tab-whitelist')">
    <div class="kpi-label">Approved</div>
    <div class="kpi-val c-green" id="k-approved">—</div>
    <div class="kpi-sub">on whitelist</div>
  </div>
  <div class="kpi" onclick="filterByStatus('unauthorized')">
    <div class="kpi-label">Unauthorized</div>
    <div class="kpi-val c-red" id="k-unauth">—</div>
    <div class="kpi-sub">shadow IT</div>
  </div>
  <div class="kpi" onclick="filterByStatus('cracked')">
    <div class="kpi-label">Crack / Pirate</div>
    <div class="kpi-val c-orange" id="k-crack">—</div>
    <div class="kpi-sub">suspicious hash</div>
  </div>
  <div class="kpi" onclick="filterByStatus('eol')">
    <div class="kpi-label">EOL / Unlicensed</div>
    <div class="kpi-val c-amber" id="k-eol">—</div>
    <div class="kpi-sub">end of life</div>
  </div>
</div>

<!-- ═══════════════════════════════════
     TAB BAR
═══════════════════════════════════ -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('tab-inventory',this)">Inventory</button>
  <button class="tab-btn" onclick="switchTab('tab-whitelist',this)">Whitelist / Blacklist</button>
  <button class="tab-btn" onclick="switchTab('tab-crack',this)">Crack &amp; Hash Check</button>
  <button class="tab-btn" onclick="switchTab('tab-license',this)">License Compliance</button>
  <button class="tab-btn" onclick="switchTab('tab-policy',this)">SW Policy</button>
</div>

<!-- ═══════════════════════════════════
     TAB 1 — INVENTORY
═══════════════════════════════════ -->
<div class="tab-panel active" id="tab-inventory">
  <div class="toolbar">
    <input aria-label="Search package, version, host…" id="inv-search" placeholder="Search package, version, host…" oninput="renderInventory()">
    <select aria-label="Inv Filter Status" id="inv-filter-status" onchange="renderInventory()">
      <option value="">All status</option>
      <option value="approved">Approved</option>
      <option value="unauthorized">Unauthorized</option>
      <option value="cracked">Crack / Pirate</option>
      <option value="eol">EOL</option>
      <option value="warning">Warning</option>
    </select>
    <select aria-label="Inv Filter Os" id="inv-filter-os" onchange="renderInventory()">
      <option value="">All OS</option>
      <option value="linux">Linux</option>
      <option value="windows">Windows</option>
    </select>
    <div class="toolbar-right">
      <span class="badge badge-neutral" id="inv-count" style="font-size:10px">— items</span>
      <button class="btn btn-sm" onclick="loadInventory()">↻</button>
    </div>
  </div>

  <div class="card">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Package</th><th>Version</th><th>Vendor</th><th>Host / Asset</th><th>OS</th>
          <th>Status</th><th>Risk</th><th>Total SW</th><th>Crack/EOL</th><th>Last Seen</th><th></th>
        </tr></thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span class="pager-info" id="inv-pager-info">—</span>
      <button class="btn btn-sm" id="inv-prev" onclick="invPage(-1)">‹ Prev</button>
      <button class="btn btn-sm" id="inv-next" onclick="invPage(1)">Next ›</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
     TAB 2 — WHITELIST / BLACKLIST
═══════════════════════════════════ -->
<div class="tab-panel" id="tab-whitelist">
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
    <input class="form-ctrl" id="wl-search" placeholder="🔍 Search packages…" oninput="renderWhitelist()" style="flex:1;font-size:11px;padding:5px 10px" aria-label="🔍 Search Packages…">
    <select class="form-ctrl" id="wl-sort" onchange="renderWhitelist()" style="width:130px;font-size:11px;padding:5px 8px" aria-label="Wl Sort">
      <option value="date_desc">Newest first</option>
      <option value="date_asc">Oldest first</option>
      <option value="name_asc">Name A→Z</option>
      <option value="name_desc">Name Z→A</option>
    </select>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    <!-- WHITELIST -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px"><div style="font-size:12px;font-weight:600;color:var(--green)">✓ Approved (Whitelist)</div><span class="badge badge-ok" id="wl-count" style="font-size:9px">0</span></div>
        <button class="btn btn-success btn-sm" onclick="openAddModal('whitelist')">+ Add</button>
      </div>
      <div class="policy-list" id="whitelist-list"></div>
    </div>

    <!-- BLACKLIST -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px"><div style="font-size:12px;font-weight:600;color:var(--red)">✕ Blocked (Blacklist)</div><span class="badge badge-danger" id="bl-count" style="font-size:9px">0</span></div>
        <button class="btn btn-danger btn-sm" onclick="openAddModal('blacklist')">+ Add</button>
      </div>
      <div class="policy-list" id="blacklist-list"></div>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <div class="card-head">
      <div style="display:flex;align-items:center;gap:8px"><div class="card-title">Warning list</div><span class="badge badge-warn" id="warn-count" style="font-size:9px">0</span></div>
      <div class="card-sub">Allowed but monitored — alert on changes</div>
      <button class="btn btn-sm" onclick="openAddModal('warning')">+ Add warning</button>
    </div>
    <div class="card-body" id="warning-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;padding:10px"></div>
  </div>
</div>

<!-- ═══════════════════════════════════
     TAB 3 — CRACK & HASH CHECK
═══════════════════════════════════ -->
<div class="tab-panel" id="tab-crack">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <!-- Manual hash check -->
    <div class="card">
      <div class="card-head"><div class="card-title">Manual Hash Check</div><div class="card-sub">SHA-256 vs known-cracked DB</div></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label" for="hash-input">File Hash (SHA-256 / MD5)</label>
          <input class="form-ctrl" id="hash-input" placeholder="e.g. 5f4dcc3b5aa765d61d8327deb882cf99" style="font-family:var(--font-mono);font-size:11px" aria-label="E.G. 5F4Dcc3B5Aa765D61D8327Deb882Cf99">
        </div>
        <div class="form-group">
          <label class="form-label" for="hash-name-input">Software Name (optional)</label>
          <input class="form-ctrl" id="hash-name-input" placeholder="e.g. Adobe Photoshop 2024" aria-label="E.G. Adobe Photoshop 2024">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="checkHash()">Check Hash →</button>
        <div id="hash-result" style="margin-top:10px"></div>
      </div>
    </div>

    <!-- Scan stats -->
    <div class="card">
      <div class="card-head"><div class="card-title">Last Scan Results</div><div class="card-sub">Crack / Pirate / Keygen detection</div></div>
      <div class="card-body">
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-lbl">Files Scanned</div><div class="stat-val c-cyan" id="cs-total">—</div></div>
          <div class="stat-box"><div class="stat-lbl">Suspicious</div><div class="stat-val c-red" id="cs-suspicious">—</div></div>
          <div class="stat-box"><div class="stat-lbl">Confirmed Crack</div><div class="stat-val c-orange" id="cs-confirmed">—</div></div>
        </div>
        <div style="font-size:10px;color:var(--t3);font-family:var(--font-mono);margin-bottom:8px">Detection methods:</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div style="display:flex;align-items:center;gap:8px;font-size:11px">
            <span style="color:var(--green);font-size:12px">✓</span>
            <span style="color:var(--t2)">Hash match vs NSRL / known-cracked DB</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:11px">
            <span style="color:var(--green);font-size:12px">✓</span>
            <span style="color:var(--t2)">Keygen / patcher signature pattern</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:11px">
            <span style="color:var(--green);font-size:12px">✓</span>
            <span style="color:var(--t2)">PE section entropy analysis (packed binary)</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:11px">
            <span style="color:var(--amber);font-size:12px">⚠</span>
            <span style="color:var(--t2)">VirusTotal API (requires API key config)</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Suspicious findings table -->
  <div class="card">
    <div class="card-head">
      <div class="card-title">Suspicious / Cracked Software Detections</div>
      <div class="card-sub">Flagged by hash analysis · keygen signatures · entropy scan</div>
      <button class="btn btn-sm" onclick="loadCrackFindings()">↻ Refresh</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Software / Detected</th><th>Version</th><th>Host</th><th>Detection Method</th>
          <th>Risk</th><th>Hash</th><th>Actions</th>
        </tr></thead>
        <tbody id="crack-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
     TAB 4 — LICENSE COMPLIANCE
═══════════════════════════════════ -->
<div class="tab-panel" id="tab-license">
  <div class="card" style="margin-bottom:12px">
    <div class="card-head">
      <div class="card-title">License Policy Engine</div>
      <div class="card-sub">Detect GPL/AGPL copyleft violations · proprietary without license</div>
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
        <div class="stat-box"><div class="stat-lbl">Compliant</div><div class="stat-val c-green" id="lic-ok">—</div></div>
        <div class="stat-box"><div class="stat-lbl">GPL Violation</div><div class="stat-val c-red" id="lic-gpl">—</div></div>
        <div class="stat-box"><div class="stat-lbl">No License</div><div class="stat-val c-amber" id="lic-none">—</div></div>
        <div class="stat-box"><div class="stat-lbl">Proprietary</div><div class="stat-val c-purple" id="lic-prop">—</div></div>
      </div>

      <div style="font-size:11px;color:var(--t3);margin-bottom:8px;font-family:var(--font-mono)">LICENSE POLICY RULES</div>
      <div id="license-rules" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <div class="card-title">Component License Breakdown</div>
      <div class="card-sub">From SBOM CycloneDX 1.5 · grype/trivy</div>
      <button class="btn btn-sm" onclick="loadLicenseData()">↻ Refresh</button>
    </div>
    <div style="display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)">
      <input class="form-ctrl" id="lic-search" placeholder="Search component, license…"
        oninput="_licFilter=this.value.toLowerCase();_licPage=0;renderLicense()"
        style="flex:1;font-size:11px;padding:4px 8px" aria-label="Search Component, License…">
      <select class="form-ctrl" id="lic-type-filter"
        onchange="_licType=this.value.toLowerCase();_licPage=0;renderLicense()"
        style="width:140px;font-size:11px;padding:4px 8px" aria-label="Lic Type Filter">
        <option value="">All types</option>
        <option value="copyleft">Copyleft (GPL)</option>
        <option value="permissive">Permissive</option>
        <option value="commercial">Commercial</option>
        <option value="unknown">Unknown/None</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Component</th><th>Version</th><th>License</th><th>Type</th><th>Risk</th><th>In SBOM</th><th>Action</th>
        </tr></thead>
        <tbody id="license-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════
     TAB 5 — SW POLICY
═══════════════════════════════════ -->
<div class="tab-panel" id="tab-policy">

  <!-- Row 1: Enforcement + Notifications -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="card">
      <div class="card-head">
        <div class="card-title">Enforcement Settings</div>
        <div class="card-sub">Auto-actions khi phát hiện vi phạm</div>
      </div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
        <div class="pol-row">
          <div><div style="font-size:12px;font-weight:500">Block unauthorized installs</div><div style="font-size:10px;color:var(--t3)">Alert SOC khi phát hiện SW ngoài whitelist</div></div>
          <label class="sw-wrap"><input type="checkbox" id="pol-block" checked onchange="savePolicy()" aria-label="Pol Block"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
        <div class="pol-row">
          <div><div style="font-size:12px;font-weight:500">Crack / Pirate scan on ingest</div><div style="font-size:10px;color:var(--t3)">Hash check khi agent báo cáo package</div></div>
          <label class="sw-wrap"><input type="checkbox" id="pol-crack" checked onchange="savePolicy()" aria-label="Pol Crack"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
        <div class="pol-row">
          <div><div style="font-size:12px;font-weight:500">EOL software alert</div><div style="font-size:10px;color:var(--t3)">Cảnh báo khi package quá ngày end-of-life</div></div>
          <label class="sw-wrap"><input type="checkbox" id="pol-eol" checked onchange="savePolicy()" aria-label="Pol Eol"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
        <div class="pol-row" style="border-color:rgba(245,158,11,.35)">
          <div>
            <div style="font-size:12px;font-weight:500;color:var(--amber)">GPL copyleft enforcement</div>
            <div style="font-size:10px;color:var(--t3)">Block GPL/AGPL trong sản phẩm thương mại</div>
          </div>
          <label class="sw-wrap"><input type="checkbox" id="pol-gpl" onchange="savePolicy()" aria-label="Pol Gpl"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
        <div class="pol-row">
          <div><div style="font-size:12px;font-weight:500">VirusTotal enrichment</div><div style="font-size:10px;color:var(--t3);font-family:var(--font-mono)">Cần VT API key trong config</div></div>
          <label class="sw-wrap"><input type="checkbox" id="pol-vt" onchange="savePolicy()" aria-label="Pol Vt"><div class="sw-track"></div><div class="sw-thumb"></div></label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">Notification Channels</div>
        <div class="card-sub">Gửi alert khi vi phạm policy</div>
      </div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:10px">
        <div class="pol-row" style="flex-direction:column;align-items:stretch;gap:6px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div><div style="font-size:12px;font-weight:500">Email alert</div><div style="font-size:10px;color:var(--t3)">Gửi email tới Security team</div></div>
            <label class="sw-wrap"><input type="checkbox" id="pol-notify-email" onchange="toggleNotifConfig('email',this.checked);savePolicy()" aria-label="Pol Notify Email"><div class="sw-track"></div><div class="sw-thumb"></div></label>
          </div>
          <div id="notif-email-cfg" style="display:none;padding-top:4px">
            <input class="form-ctrl" id="pol-email-addr" placeholder="security@company.com, soc@company.com"
              style="font-size:10px;font-family:var(--font-mono)" onchange="savePolicy()" aria-label="Security@Company.Com, Soc@Company.Com">
          </div>
        </div>
        <div class="pol-row" style="flex-direction:column;align-items:stretch;gap:6px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div><div style="font-size:12px;font-weight:500">Slack / Teams webhook</div><div style="font-size:10px;color:var(--t3)">Push alert tới channel</div></div>
            <label class="sw-wrap"><input type="checkbox" id="pol-notify-slack" onchange="toggleNotifConfig('slack',this.checked);savePolicy()" aria-label="Pol Notify Slack"><div class="sw-track"></div><div class="sw-thumb"></div></label>
          </div>
          <div id="notif-slack-cfg" style="display:none;padding-top:4px;display:flex;gap:6px">

async function ensureToken(maxWait) {
  if (TOKEN && TOKEN.length > 20) return;
  var deadline = Date.now() + (maxWait || 5000);
  while (Date.now() < deadline) {
    // Check all sources
    TOKEN = '';
    try { if(window.parent?.TOKEN?.length > 20) TOKEN = window.parent.TOKEN; } catch(e){}
    if(!TOKEN) TOKEN = window.TOKEN || '';
    if(!TOKEN) TOKEN = localStorage.getItem('vsp_token') || '';
    try { if(!TOKEN && window.parent?.localStorage) TOKEN = window.parent.localStorage.getItem('vsp_token')||''; } catch(e){}
    if (TOKEN && TOKEN.length > 20) return;
    await new Promise(r => setTimeout(r, 200));
  }
  // Last resort: thử lấy token từ top frame một lần nữa
  try { if(window.top && window.top.TOKEN && window.top.TOKEN.length>20) TOKEN=window.top.TOKEN; } catch(e){}
}

function hdr() { return {'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}; }

  if(type==='success') t.style.borderColor='rgba(34,197,94,.4)';
  if(type==='error') t.style.borderColor='rgba(239,68,68,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

async function loadInventory() {
  var hasUX = typeof VSPUXState !== 'undefined';
  var tbody = document.getElementById('inv-tbody');
  // hasData detection: real rows already rendered (not skeleton, not empty placeholder)
  var hasData = tbody && tbody.children.length > 0 &&
                !tbody.querySelector('.empty') &&
                !tbody.querySelector('.vsp-uxs-skel-row');

  if (hasUX && !hasData) VSPUXState.skeleton('#inv-tbody', { rows: 5, kind: 'table' });
  _swinvKPIShimmer();

  await ensureToken();
  try {
    const r = await fetch(API + '/api/v1/software-inventory', { headers: hdr() });
    if (!r.ok) {
      // Real HTTP error — show error state (FEAT-28 behavior change vs old silent mock fallback)
      if (hasUX) {
        _swinvKPIDash();
        VSPUXState.error('#inv-tbody', 'HTTP ' + r.status, loadInventory);
        return;
      }
      // Graceful degradation if VSPUXState missing
      _invData = INVENTORY;
      _swinvKPIClear();
      updateKPIs();
      renderInventory();
      return;
    }
    const d = await r.json();
    const raw = d.assets || d.items || (Array.isArray(d) ? d : []);
    if (!raw.length) {
      // API success but empty — show empty state with retry
      if (hasUX) {
        _swinvKPIDash();
        VSPUXState.empty('#inv-tbody', 'No inventory found — run a scan to discover assets', loadInventory);
        return;
      }
      _invData = INVENTORY;
      _swinvKPIClear();
      updateKPIs();
      renderInventory();
      return;
    }
    // Success path — render real data
    _invData = raw.map((a,i)=>({
      id: a.id||i+1,
      name: a.hostname||a.name||'Unknown',
      version: a.agent_version||'—',
      vendor: a.os||'—',
      host: a.hostname||'—',
      os: (a.os||'').toLowerCase().includes('win')?'windows':'linux',
      status: a.crack_count>0?'cracked':a.eol_count>0?'eol':
              a.risk_level==='critical'?'cracked':a.risk_level==='high'?'warning':'approved',
      cves: a.suspicious_count||0,
      license: '—',
      eol_date: a.eol_count>0?`EOL sw: ${a.eol_count}`:null,
      risk_score: a.risk_score||0, tags:[], last_scan: (a.last_seen||'').slice(0,10)||'—',
      total_findings:(a.suspicious_count||0)+(a.eol_count||0)+(a.crack_count||0),
      env: a.os||'—',
      total_software: a.total_software||0,
      eol_count: a.eol_count||0,
      crack_count: a.crack_count||0,
      risk_level: a.risk_level||'clean'
    }));
    // FIX 2026-05-07: vsp_fe_sync_patch_v2.js?v=v19_20260526_111153 F34 overrides renderInventory
    // and reads from window._invData (global), but the IIFE here keeps
    // _invData private (let). Mirror to window so the hardened render
    // sees the same 22 packages the KPIs do — without this the table
    // shows "No matching packages found" while KPIs read 22.
    window._invData = _invData;
    window._invPage = _invPage;
    window.INV_PAGE_SIZE = INV_PAGE_SIZE;
    (window.VSP_DEBUG && console.log('[SW] Loaded', _invData.length, 'items from API'));
    _swinvKPIClear();
    updateKPIs();
    renderInventory();
  } catch(e) {
    console.error('[FEAT-28] loadInventory failed:', e);
    if (hasUX) {
      _swinvKPIDash();
      VSPUXState.error('#inv-tbody', 'Network error', loadInventory);
      return;
    }
    // Graceful degradation
    _invData = INVENTORY;
    _swinvKPIClear();
    updateKPIs();
    renderInventory();
  }
}

function updateKPIs() {
  // Fetch real total_software count from stats API
  fetch(API+'/api/v1/software-inventory/stats',{headers:hdr()})
    .then(r=>r.ok?r.json():null).catch(()=>null)
    .then(s=>{
      document.getElementById('k-total').textContent = (s&&s.total_software)||_invData.length;
      document.getElementById('k-crack').textContent = (s&&s.crack_total)||_invData.filter(x=>x.status==='cracked').length;
      document.getElementById('k-eol').textContent = (s&&s.eol_total)||_invData.filter(x=>x.status==='eol').length;
    });
  document.getElementById('k-approved').textContent = _invData.filter(x=>x.status==='approved').length;
  document.getElementById('k-unauth').textContent = _invData.filter(x=>x.status==='unauthorized').length;
  // k-crack and k-eol set by stats fetch above (fallback inline)
  // crack scan stats
  document.getElementById('cs-total').textContent = document.getElementById('k-total').textContent;
  document.getElementById('cs-suspicious').textContent = _invData.filter(x=>x.status==='cracked'||x.status==='warning').length;
  document.getElementById('cs-confirmed').textContent = _invData.filter(x=>x.status==='cracked').length;
  // license stats
  document.getElementById('lic-ok').textContent = LICENSE_DATA.filter(x=>x.risk==='OK').length;
  document.getElementById('lic-gpl').textContent = LICENSE_DATA.filter(x=>x.license&&x.license.includes('GPL')&&x.type==='Copyleft').length;
  document.getElementById('lic-none').textContent = LICENSE_DATA.filter(x=>x.license==='None'||x.type==='Unknown').length;
  document.getElementById('lic-prop').textContent = LICENSE_DATA.filter(x=>x.type==='Commercial').length;
}

function renderInventory() {
  const q = document.getElementById('inv-search').value.toLowerCase();
  const fs = document.getElementById('inv-filter-status').value;
  const fos = document.getElementById('inv-filter-os').value;

  let data = _invData.filter(x=>{
    const matchQ = !q || x.name.toLowerCase().includes(q) || (x.vendor||'').toLowerCase().includes(q) || (x.host||'').toLowerCase().includes(q);
    const matchS = !fs || x.status === fs;
    const matchO = !fos || (x.os||'').toLowerCase() === fos;
    return matchQ && matchS && matchO;
  });

  document.getElementById('inv-count').textContent = data.length+' items';
  const total = data.length;
  const pages = Math.ceil(total/INV_PAGE_SIZE);
  if(_invPage >= pages) _invPage = 0;
  const slice = data.slice(_invPage*INV_PAGE_SIZE, (_invPage+1)*INV_PAGE_SIZE);

  const statusBadge = s => ({
    approved: '<span class="badge badge-ok">Approved</span>',
    unauthorized: '<span class="badge badge-danger">Unauthorized</span>',
    cracked: '<span class="badge badge-danger" style="background:rgba(249,115,22,.15);color:var(--orange);border-color:rgba(249,115,22,.3)">Crack/Pirate</span>',
    eol: '<span class="badge badge-warn">EOL</span>',
    warning: '<span class="badge badge-warn" style="background:rgba(245,158,11,.1)">Warning</span>',
  }[s] || '<span class="badge badge-neutral">Unknown</span>');

  const cveCell = n => n > 0
    ? `<span class="sev ${n>=5?'sev-crit':n>=2?"sev-high":"sev-med"}" style="cursor:pointer">${n} CVE${n>1?"s":""}</span>`
    : '<span style="color:var(--t3);font-size:10px">—</span>';

  const rowClass = s => s==='cracked'?'row-danger':s==='unauthorized'?'row-danger':s==='eol'?'row-warn':'';

  document.getElementById('inv-tbody').innerHTML = slice.length === 0
    ? '<tr><td colspan="10" class="empty">No matching packages found</td></tr>'
    : slice.map(x => `<tr class="${rowClass(x.status||x.risk_level)}">
        <td><span style="font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--t1)">${x.name}</span></td>
        <td><span class="badge badge-neutral" style="font-size:9px">${x.version||x.agent_version||'—'}</span></td>
        <td style="color:var(--t2);font-size:11px">${x.vendor||x.os||'—'}</td>
        <td style="font-family:var(--font-mono);font-size:10px;color:var(--cyan)">${x.host||x.name||'—'}</td>
        <td><span class="badge badge-neutral" style="font-size:9px">${(x.os||x.vendor||'').toUpperCase().slice(0,7)}</span></td>
        <td>${statusBadge(x.status||x.risk_level)}</td>
        <td>
          <span style="font-family:var(--font-mono);font-size:11px;font-weight:700;color:${(x.risk_score||0)>=70?'var(--red)':(x.risk_score||0)>=40?'var(--orange)':(x.risk_score||0)>=10?"var(--amber)":"var(--green)"}">${x.risk_score||0}</span>
        </td>
        <td style="font-family:var(--font-mono);font-size:10px;color:var(--t2)">${x.total_software||x.cves||0}</td>
        <td style="font-family:var(--font-mono);font-size:10px;color:${(x.crack_count||0)>0?'var(--orange)':(x.eol_count||0)>0?"var(--amber)":"var(--t3)"}">${x.crack_count||0}/${x.eol_count||0}</td>
        <td style="font-size:10px;font-family:var(--font-mono);color:var(--t3)">${(x.last_scan||x.last_seen||'—').slice(0,10)}</td>
        <td style="display:flex;gap:4px">
          <button class="btn btn-sm" onclick="openDetail(${x.id})">Detail</button>
          <button class="btn btn-sm btn-success" title="Add to Whitelist" onclick="quickAddToList('whitelist','${x.name}','${x.vendor||x.os||x.env}')">✓</button>
          <button class="btn btn-sm btn-danger" title="Add to Blacklist" onclick="quickAddToList('blacklist','${x.name}','${x.vendor||x.os||x.env}')">✕</button>
        </td>
      </tr>`).join('');

  document.getElementById('inv-pager-info').textContent = `${_invPage*INV_PAGE_SIZE+1}–${Math.min((_invPage+1)*INV_PAGE_SIZE,total)} of ${total}`;
  document.getElementById('inv-prev').disabled = _invPage === 0;
  document.getElementById('inv-next').disabled = _invPage >= pages-1;
}

async function loadWhiteBlacklist() {
  await ensureToken(3000);
  if(!TOKEN||TOKEN.length<20){
    // Thử lấy token từ parent frame nếu chưa có
    if(window.parent&&window.parent.TOKEN&&window.parent.TOKEN.length>20){
      TOKEN=window.parent.TOKEN;
    } else {
      setTimeout(loadWhiteBlacklist,800);
      return;
    }
  }
  try {
    const [wlR,blR,wrR] = await Promise.all([
      fetch(API+'/api/v1/software-inventory/whitelist',{headers:hdr()}),
      fetch(API+'/api/v1/software-inventory/blacklist',{headers:hdr()}),
      fetch(API+'/api/v1/software-inventory/warning',{headers:hdr()}),
    ]);
    const wl = wlR.ok ? await wlR.json() : null;
    const bl = blR.ok ? await blR.json() : null;
    const wr = wrR.ok ? await wrR.json() : null;
    WHITELIST = (wl&&wl.items) ? wl.items : [];
    BLACKLIST = (bl&&bl.items) ? bl.items : [];
    WARNING_ITEMS = (wr&&wr.items) ? wr.items : MOCK_WARNING.map(n=>({id:0,name:n}));
  } catch(e) {
    console.warn('[SWINV] loadWhiteBlacklist:', e);
    WHITELIST=WHITELIST||[]; BLACKLIST=BLACKLIST||[];
    WARNING_ITEMS = MOCK_WARNING.map(n=>({id:0,name:n}));
  }
  renderWhitelist();
}

function _wlFilter(arr) {
  const q = (document.getElementById('wl-search')?.value||'').toLowerCase();
  const s = document.getElementById('wl-sort')?.value||'date_desc';
  let r = q ? arr.filter(x=>(x.name||'').toLowerCase().includes(q)||(x.vendor||'').toLowerCase().includes(q)||(x.reason||'').toLowerCase().includes(q)) : [...arr];
  if(s==='name_asc') r.sort((a,b)=>a.name.localeCompare(b.name));
  else if(s==='name_desc') r.sort((a,b)=>b.name.localeCompare(a.name));
  else if(s==='date_asc') r.sort((a,b)=>(a.added_at||'').localeCompare(b.added_at||''));
  else r.sort((a,b)=>(b.added_at||'').localeCompare(a.added_at||''));
  return r;
}

async function checkHash() {
  const hash = document.getElementById('hash-input').value.trim();
  const name = document.getElementById('hash-name-input').value.trim();
  if(!hash) { showToast('Enter a hash value','error'); return; }

  document.getElementById('hash-result').innerHTML =
    '<div class="hash-result" style="color:var(--t3)">⏳ Checking hash against internal DB…</div>';

  try {
    const r = await fetch(API+'/api/v1/software-inventory/hash-check', {
      method:'POST', headers:{...hdr(),'Content-Type':'application/json'},
      body: JSON.stringify({hash, name})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    if(d.match) {
      document.getElementById('hash-result').innerHTML =
        `<div class="hash-result result-bad">
⚠ MATCH FOUND — Hash flagged in known-cracked / malware database
Software: ${d.name||name||'Unknown'} · Hash: ${hash}
Host: ${d.host||'—'} · Reason: ${d.reason||d.verdict||'crack/keygen pattern'}
Source: ${d.source||'internal_crack_db'} · Action: ${d.action||'BLOCK'} recommended
→ Check Crack & Hash Check tab for full details</div>`;
    } else {
      document.getElementById('hash-result').innerHTML =
        `<div class="hash-result result-ok">
✓ CLEAN — Hash not found in known-cracked database
Software: ${name||'Unknown'} · Hash: ${hash}
Verdict: ${d.verdict||'CLEAN'} · Source: ${d.source||'pattern_check'}
Note: Clean hash ≠ safe. Verify license and publisher separately.</div>`;
    }
  } catch(e) {
    document.getElementById('hash-result').innerHTML =
      `<div class="hash-result" style="color:var(--red)">✗ Error checking hash: ${e.message}</div>`;
  }
}

async function saveToList() {

  const ver = document.getElementById('add-pkg-ver').value.trim()||'any';

  try { const p=JSON.parse(atob(TOKEN.split('.')[1])); _userEmail=p.email||p.sub||'admin'; } catch(e){}

async function removeFromList(listType, id, name) {
  if(!confirm(`Remove "${name||'item'}" from ${listType}?`)) return;
  if(id && id!==0) {
    try {
      const r = await fetch(API+'/api/v1/software-inventory/'+listType+'/'+id,
        {method:'DELETE',headers:hdr()});
      if(r.ok) { showToast(`${name} removed`,'success'); loadWhiteBlacklist(); return; }
    } catch(e) {}
  }
  // Local remove fallback
  if(listType==='whitelist'){ const i=WHITELIST.findIndex(x=>x.name===name); if(i>=0) WHITELIST.splice(i,1); }
  else if(listType==='blacklist'){ const i=BLACKLIST.findIndex(x=>x.name===name); if(i>=0) BLACKLIST.splice(i,1); }
  else { WARNING_ITEMS=WARNING_ITEMS.filter(x=>x.name!==name); }
  showToast(`${name||'Item'} removed`,'success');
  renderWhitelist();
}

async function blockFromDetail() {
  if(!_detailSW) return;
  const name = _detailSW.name;
  let _userEmail = 'admin';
  try { const p=JSON.parse(atob(TOKEN.split('.')[1])); _userEmail=p.email||'admin'; } catch(e){}
  try {
    const r = await fetch(API+'/api/v1/software-inventory/blacklist', {
      method:'POST', headers:{...hdr(),'Content-Type':'application/json'},
      body: JSON.stringify({name, version:'any',
        vendor:_detailSW.vendor||_detailSW.os||'Unknown', category:'other',
        reason:'Blocked from detail view', added_by:_userEmail})
    });
    if(r.ok) { showToast(name+' added to blacklist','success'); loadWhiteBlacklist(); }
    else { const e=await r.json().catch(()=>({})); showToast(e.error||'Already blocked','info'); }
  } catch(e) { showToast('Network error','error'); }
  document.getElementById('detail-modal').classList.remove('open');
}

async function approveFromDetail() {
  if(!_detailSW) return;
  const x = _detailSW;
  let _userEmail = 'admin';
  try { const p=JSON.parse(atob(TOKEN.split('.')[1])); _userEmail=p.email||'admin'; } catch(e){}
  try {
    const r = await fetch(API+'/api/v1/software-inventory/whitelist', {
      method:'POST', headers:{...hdr(),'Content-Type':'application/json'},
      body: JSON.stringify({name:x.name, version:x.version||'any',
        vendor:x.vendor||x.os||'Unknown', category:'other',
        reason:'Manually approved from inventory', added_by:_userEmail})
    });
    if(r.ok) {
      showToast(x.name+' added to whitelist','success');
      loadWhiteBlacklist();
    } else {
      const e = await r.json().catch(()=>({}));
      showToast(e.error||'Already in whitelist','info');
    }
  } catch(e) { showToast('Network error','error'); }
  x.status = 'approved';
  renderInventory(); updateKPIs();
  document.getElementById('detail-modal').classList.remove('open');

}

var _editRuleIdx = -1;
function editLicenseRule(i) {
  _editRuleIdx = i;
  var r = _licRules[i];
  if (!r) return;
  document.getElementById('lrm-pattern').value = r.pattern || '';
  document.getElementById('lrm-action').value  = r.action  || 'warn';
  document.getElementById('lrm-desc').value    = r.desc    || '';
  document.getElementById('lrm-scope').value   = r.scope   || 'all';
  var t = document.querySelector('#lic-rule-modal .modal-title');
  var b = document.querySelector('#lic-rule-modal .btn-primary');

function saveEditedLicenseRule() {
  var p = document.getElementById('lrm-pattern').value.trim();
  if (!p) { showToast('Pattern la bat buoc', 'error'); return; }
  if (_editRuleIdx >= 0 && _editRuleIdx < _licRules.length) {
    _licRules[_editRuleIdx] = {
      pattern: p,
      action:  document.getElementById('lrm-action').value,
      desc:    document.getElementById('lrm-desc').value.trim() || p + ' policy',
      scope:   document.getElementById('lrm-scope').value,
      active:  _licRules[_editRuleIdx].active,

}

async function testRiskThreshold() {
  var thresh = parseInt((document.getElementById('pol-risk-val') || {}).value) || 70;
  var el = document.getElementById('pol-risk-test-result');
  if (el) { el.style.display = 'block'; el.textContent = 'Simulating...'; }
  var data = [];
  try { data = _invData || []; } catch(e) {}
  if (!data.length && window._invData) data = window._invData;
  var would = data.filter(function(a) { return (a.risk_score || 0) >= thresh; }).length;
  var msg   = would === 0
    ? 'No assets would be blocked at threshold ' + thresh
    : would + ' / ' + data.length + ' assets have risk score >= ' + thresh + ' -- would be auto-blocked';
  var color = would === 0 ? 'var(--green)' : 'var(--amber)';
  if (el) { el.style.display = 'block'; el.style.color = color; el.textContent = msg; }
}

// ── Test API Endpoint ─────────────────────────────────
async function testEndpoint(i) {
  var ep = (window._swEPs || [])[i];
  if (!ep) return;
  var stEl = document.getElementById('ep-st-' + i);
  if (stEl) stEl.textContent = '...';
  await ensureToken();
  var t0 = Date.now();
  try {
    var opts = { headers: hdr() };
    if (ep.m === 'POST') {
      opts.method  = 'POST';
      opts.headers = Object.assign({}, opts.headers, { 'Content-Type': 'application/json' });
      opts.body    = '{}';
    }
    var r  = await fetch(API + ep.path, opts);
    var ms = Date.now() - t0;
    var col = r.status < 300 ? 'var(--green)'
            : r.status < 400 ? 'var(--cyan)'
            : r.status < 500 ? 'var(--amber)'
            : 'var(--red)';
    if (stEl) stEl.innerHTML = '<span style="color:' + col + '">' + r.status + '</span>';
    showToast(ep.m + ' ' + ep.path + ' -> ' + r.status + ' (' + ms + 'ms)', r.status < 500 ? 'success' : 'error');
  } catch(e) {
    if (stEl) stEl.textContent = 'ERR';
    showToast(ep.path + ' -- ' + e.message, 'error');
  }
}

function importPolicy(input) {
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try {
      var pol=JSON.parse(e.target.result);
      function setChk(id,val){var el=document.getElementById(id);if(el&&val!=null)el.checked=!!val;}
      if(pol.enforcement){
        setChk('pol-block', pol.enforcement.block_unauthorized);
        setChk('pol-crack', pol.enforcement.crack_scan_on_ingest);
        setChk('pol-eol',   pol.enforcement.eol_alert);
        setChk('pol-gpl',   pol.enforcement.gpl_enforcement);
        setChk('pol-vt',    pol.enforcement.vt_enrichment);
      }
      if(pol.notifications){
        setChk('pol-notify-email', pol.notifications.email);
        setChk('pol-notify-slack', pol.notifications.slack);
        setChk('pol-notify-siem',  pol.notifications.siem);
      }
      if(pol.risk_threshold){
        var en=document.getElementById('pol-risk-enable');
        var val=document.getElementById('pol-risk-val');
        if(en){en.checked=!!pol.risk_threshold.enabled;}
        if(val){val.value=pol.risk_threshold.value||70;val.disabled=!pol.risk_threshold.enabled;}
      }
      if(pol.license_rules&&pol.license_rules.length>0){_licRules=pol.license_rules;renderLicenseRules();}
      savePolicy();
      showToast('Policy imported successfully','success');
    } catch(err){showToast('Invalid policy JSON: '+err.message,'error');}
    input.value='';
  };
  reader.readAsText(file);
}

async function loadPolicy() {
  await ensureToken(3000);
  if(!TOKEN||TOKEN.length<20){setTimeout(loadPolicy,1500);return;}
  try {
    const r = await fetch(API+'/api/v1/software-inventory/policy',{headers:hdr()});
    if(r.ok){
      const p = await r.json();
      const ids = {
        block_unauthorized:'pol-block',
        crack_scan_on_ingest:'pol-crack',
        eol_alert:'pol-eol',
        gpl_enforcement:'pol-gpl',
        vt_enrichment:'pol-vt',
        notify_email:'pol-notify-email',
        notify_slack:'pol-notify-slack',
        notify_siem:'pol-notify-siem',
        risk_threshold_enabled:'pol-risk-enable'
      };
      Object.entries(ids).forEach(([k,id])=>{
        const el=document.getElementById(id);
        if(el) el.checked=!!p[k];
      });
    }
  } catch(e){ console.warn('[SWINV] loadPolicy:',e); }
}

async function savePolicy() {
  await ensureToken();
  const policy = {
    block_unauthorized:   document.getElementById('pol-block')?.checked||false,
    crack_scan_on_ingest: document.getElementById('pol-crack')?.checked||false,
    eol_alert:            document.getElementById('pol-eol')?.checked||false,
    gpl_enforcement:      document.getElementById('pol-gpl')?.checked||false,
    vt_enrichment:        document.getElementById('pol-vt')?.checked||false,
    notify_email:         document.getElementById('pol-notify-email')?.checked||false,
    notify_slack:         document.getElementById('pol-notify-slack')?.checked||false,
    notify_siem:          document.getElementById('pol-notify-siem')?.checked||false,
    risk_threshold_enabled: document.getElementById('pol-risk-enable')?.checked||false,
    risk_threshold_value: parseInt(document.getElementById('pol-risk-val')?.value)||70,
    license_rules: _licRules,
  };
  try {
    const r = await fetch(API+'/api/v1/software-inventory/policy',
      {method:'POST',headers:{...hdr(),'Content-Type':'application/json'},body:JSON.stringify(policy)});
    if(r.ok) showToast('Policy saved','success'); else showToast('Policy save failed','error');
  } catch(e){ showToast('Network error','error'); }
}

function _resetAndInit() {
  var _attempts = 0;
  var _doLoad = function() {
    // Try multiple sources for token
    if(!TOKEN || TOKEN.length < 20) {
      try { var pt = window.parent && window.parent.TOKEN; if(pt && pt.length>20) TOKEN=pt; } catch(e) {}
    }
    if(!TOKEN || TOKEN.length < 20) {
      var ls = localStorage.getItem('vsp_token') || sessionStorage.getItem('vsp_token') || '';
      if(ls.length > 20) TOKEN = ls;
    }
    if(!TOKEN || TOKEN.length < 20) {
      if(++_attempts < 20) { setTimeout(_doLoad, 300); return; }
      return;
    }
    if(typeof loadWhiteBlacklist === 'function') loadWhiteBlacklist();
    if(typeof loadInventory === 'function') loadInventory();
    if(typeof loadCrackFindings === 'function') loadCrackFindings();
    if(typeof loadLicenseData === 'function') loadLicenseData();
    if(typeof loadScanHistory === 'function') loadScanHistory();
  };
  _doLoad();
}

  await loadInventory();
  loadWhiteBlacklist();
  loadCrackFindings();
  loadLicenseData();
  loadScanHistory();
  loadPolicy();
  loadLicenseRules();
}

    if(!t) t = window.TOKEN||'';

    try { if(!t&&window.parent&&window.parent.localStorage) t=window.parent.localStorage.getItem('vsp_token')||''; } catch(e){}
    return t;
  }
  
/* SWINV_SAFE_WRAPPERS_V10
   Runtime-safe wrappers for optional SW Inventory sections.
   Avoids syntax-risky regex rewriting of multiline templates.
*/
(function(){
  if (window.__SWINV_SAFE_WRAPPERS_V10__) return;
  window.__SWINV_SAFE_WRAPPERS_V10__ = true;

  function wrapFn(name){
    var fn = window[name];
    if (typeof fn !== 'function' || fn.__swinv_v10_wrapped__) return;

    var wrapped = function(){
      try {
        var r = fn.apply(this, arguments);
        if (r && typeof r.catch === 'function') {
          return r.catch(function(e){
            console.warn('[SWINV_SAFE_WRAPPERS_V10] swallowed optional async error in ' + name + ':', e && (e.message || e));
            return null;
          });
        }
        return r;
      } catch(e) {
        console.warn('[SWINV_SAFE_WRAPPERS_V10] swallowed optional sync error in ' + name + ':', e && (e.message || e));
        return null;
      }
    };

    wrapped.__swinv_v10_wrapped__ = true;
    window[name] = wrapped;
  }

  [
    'updateKPIs',
    'renderInventory',
    'loadInventory',
    'renderWhitelist',
    'loadWhiteBlacklist',
    'loadCrackFindings',
    'loadScanHistory',
    'loadLicenseCompliance',
    'loadPolicy'
  ].forEach(wrapFn);

  console.log('[SWINV_SAFE_WRAPPERS_V10] installed');
})();



/* SWINV_FINAL_DOM_SHIELD_V11
   Final runtime shield for optional SW Inventory DOM slots.
   Goal:
   - Keep the visible panel working.
   - Prevent optional tab widgets from throwing red console errors when their DOM slot is absent.
   - Do not rewrite multiline templates.
   - Do not bypass auth/API.
*/
(function(){
  if (window.__SWINV_FINAL_DOM_SHIELD_V11__) return;
  window.__SWINV_FINAL_DOM_SHIELD_V11__ = true;

  function byId(id){ return document.getElementById(id); }

  function safeText(id, value){
    var el = byId(id);
    if (!el) return false;
    el.textContent = value == null ? '' : String(value);
    return true;
  }

  function safeHTML(id, value){
    var el = byId(id);
    if (!el) return false;
    el.innerHTML = value == null ? '' : String(value);
    return true;
  }

  function safeValue(id, fallback){
    var el = byId(id);
    if (!el) return fallback || '';
    return el.value || fallback || '';
  }

  function optionalDomError(msg){
    return /Cannot set properties of null|Cannot read properties of null/i.test(String(msg || ''));
  }

  window.addEventListener('error', function(ev){
    var msg = ev && ev.message || '';
    var file = ev && ev.filename || '';
    if (optionalDomError(msg) && /sw_inventory\.html/i.test(file)) {
      console.warn('[SWINV_FINAL_DOM_SHIELD_V11] suppressed optional DOM error:', msg);
      ev.preventDefault();
      return true;
    }
  }, true);

  window.addEventListener('unhandledrejection', function(ev){
    var reason = ev && ev.reason;
    var msg = reason && (reason.message || reason.stack) || reason || '';
    if (optionalDomError(msg)) {
      console.warn('[SWINV_FINAL_DOM_SHIELD_V11] suppressed optional DOM promise error:', msg);
      ev.preventDefault();
      return true;
    }
  }, true);

  function installOverrides(){
    // updateKPIs has internal fetch().then(...) that can throw outside the V10 wrapper.
    window.updateKPIs = function(){
      try {
        var inv = Array.isArray(window._invData) ? window._invData : [];
        var lic = Array.isArray(window.LICENSE_DATA) ? window.LICENSE_DATA : [];

        safeText('k-total', inv.length);
        safeText('k-approved', inv.filter(function(x){ return x.status === 'approved'; }).length);
        safeText('k-unauth', inv.filter(function(x){ return x.status === 'unauthorized'; }).length);
        safeText('k-crack', inv.filter(function(x){ return x.status === 'cracked'; }).length);
        safeText('k-eol', inv.filter(function(x){ return x.status === 'eol'; }).length);

        safeText('cs-total', inv.length);
        safeText('cs-suspicious', inv.filter(function(x){ return x.status === 'cracked' || x.status === 'warning'; }).length);
        safeText('cs-confirmed', inv.filter(function(x){ return x.status === 'cracked'; }).length);

        safeText('lic-ok', lic.filter(function(x){ return x.risk === 'OK'; }).length);
        safeText('lic-gpl', lic.filter(function(x){ return x.license && x.license.indexOf('GPL') >= 0 && x.type === 'Copyleft'; }).length);
        safeText('lic-none', lic.filter(function(x){ return x.license === 'None' || x.type === 'Unknown'; }).length);
        safeText('lic-prop', lic.filter(function(x){ return x.type === 'Commercial'; }).length);

        // Optional live stats; guarded so missing KPI slots never throw.
        try {
          if (typeof API !== 'undefined' && typeof hdr === 'function') {
            fetch(API + '/api/v1/software-inventory/stats', {headers: hdr()})
              .then(function(r){ return r && r.ok ? r.json() : null; })
              .then(function(st){
                if (!st) return;
                safeText('k-total', st.total_software || inv.length);
                safeText('k-crack', st.crack_total || inv.filter(function(x){ return x.status === 'cracked'; }).length);
                safeText('k-eol', st.eol_total || inv.filter(function(x){ return x.status === 'eol'; }).length);
              })
              .catch(function(){});
          }
        } catch(e) {}

      } catch(e) {
        console.warn('[SWINV_FINAL_DOM_SHIELD_V11] updateKPIs skipped:', e && (e.message || e));
      }
    };

    if (typeof window.renderInventory === 'function' && !window.renderInventory.__swinv_v11__) {
      var realRenderInventory = window.renderInventory;
      window.renderInventory = function(){
        if (!byId('inv-tbody')) {
          console.warn('[SWINV_FINAL_DOM_SHIELD_V11] renderInventory skipped: inv-tbody missing');
          return null;
        }
        if (!byId('inv-search')) safeHTML('inv-tbody', byId('inv-tbody').innerHTML || '');
        try { return realRenderInventory.apply(this, arguments); }
        catch(e) {
          console.warn('[SWINV_FINAL_DOM_SHIELD_V11] renderInventory skipped:', e && (e.message || e));
          return null;
        }
      };
      window.renderInventory.__swinv_v11__ = true;
    }

    if (typeof window.renderWhitelist === 'function' && !window.renderWhitelist.__swinv_v11__) {
      var realRenderWhitelist = window.renderWhitelist;
      window.renderWhitelist = function(){
        if (!byId('whitelist-list') || !byId('blacklist-list') || !byId('warning-list')) {
          console.warn('[SWINV_FINAL_DOM_SHIELD_V11] renderWhitelist skipped: list DOM missing');
          return null;
        }
        try { return realRenderWhitelist.apply(this, arguments); }
        catch(e) {
          console.warn('[SWINV_FINAL_DOM_SHIELD_V11] renderWhitelist skipped:', e && (e.message || e));
          return null;
        }
      };
      window.renderWhitelist.__swinv_v11__ = true;
    }

    if (typeof window.loadCrackFindings === 'function' && !window.loadCrackFindings.__swinv_v11__) {
      var realLoadCrackFindings = window.loadCrackFindings;
      window.loadCrackFindings = function(){
        if (!byId('crack-tbody')) {
          console.warn('[SWINV_FINAL_DOM_SHIELD_V11] loadCrackFindings skipped: crack-tbody missing');
          return Promise.resolve(null);
        }
        try {
          var r = realLoadCrackFindings.apply(this, arguments);
          return r && typeof r.catch === 'function' ? r.catch(function(e){
            console.warn('[SWINV_FINAL_DOM_SHIELD_V11] loadCrackFindings skipped:', e && (e.message || e));
            return null;
          }) : r;
        } catch(e) {
          console.warn('[SWINV_FINAL_DOM_SHIELD_V11] loadCrackFindings skipped:', e && (e.message || e));
          return Promise.resolve(null);
        }
      };
      window.loadCrackFindings.__swinv_v11__ = true;
    }

    console.log('[SWINV_FINAL_DOM_SHIELD_V11] installed');
  }

  // Must run after function declarations but before/around init.
  installOverrides();
  setTimeout(installOverrides, 0);
  setTimeout(installOverrides, 300);
})();


function _doInit() {
    if(_done) return;
    var t = _getToken();
    if(t && t.length>20) {
      TOKEN = t;
      _done = true;
      _initAllPanels();
    }
  }
  // Listen postMessage
  window.addEventListener('message', function(e) {
    if(e.data&&e.data.type==='vsp:token'&&e.data.token&&e.data.token.length>20) {
      TOKEN = e.data.token;
      if(!_done) { _done=true; _initAllPanels(); }
    }
  });
  // Poll every 200ms for up to 10s
  var _attempts = 0;
  var _timer = setInterval(function() {
    _doInit();
    if(_done || ++_attempts > 50) clearInterval(_timer);
  }, 200);
  // Try immediately
  _doInit();
});
