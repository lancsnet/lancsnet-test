        auth_request /cicd-read-check;  # ROUND9 findings:read
        auth_request_set $vsp_role $upstream_http_x_role;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
