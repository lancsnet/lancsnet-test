server {
    listen 80;
    server_name vsp.linksafe.vn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host:30800$request_uri; }
}

server {
    listen 30800 ssl;
    server_name vsp.linksafe.vn;

    ssl_certificate     /etc/ssl/certs/vsp.linksafe.vn.crt;
    ssl_certificate_key /etc/ssl/private/vsp.linksafe.vn.key;

    # ROUND6: 8 sensitive guard -> ~* + /?$
    # ROUND4_CANON: strip matrix/path params (;a=1, ;jsessionid) truoc khi match location.
    # KHONG strip trailing slash global: bare-collection (/api/v1/soar/ ...) se rot khoi prefix-guard.
    rewrite "^([^;]+);.*$" $1;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # ORIG_METHOD_GUARD: lo original method/uri cho auth subrequest
    set $orig_method $request_method;
    set $orig_uri $request_uri;
    location = /audit-rolecheck {
        internal;
        proxy_pass http://127.0.0.1:8950/audit-rolecheck;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }
    location /api/v1/audit/ {
        # audit-rolecheck trả 403 cho cả "no token" lẫn "wrong role"
        # Map về 401 nếu không có Authorization header
        set $audit_unauthed 0;
        if ($http_authorization = "") { set $audit_unauthed 1; }
        if ($audit_unauthed = 1) { return 401 '{"error":"unauthorized"}'; }
        auth_request /audit-rolecheck;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }




    location /panels/ {
        alias /home/devsecops/vsp-platform-v4.9.0/static/panels/;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800;
        types { text/html html; application/javascript js; text/css css; }
    }

    location /static/ {
        alias /home/devsecops/vsp-platform-v4.9.0/static/;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800;
        types { application/javascript js; text/css css; image/png png; image/svg+xml svg; }
    }


    location ~* ^/vsp_enterprise.*\.css$ {
        root /home/devsecops/vsp-platform-v4.9.0/static;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800;
    }
    location = /api/v1/siem/report.pdf {
        add_header Content-Type application/pdf always;
        add_header Content-Disposition "attachment; filename=vsp_siem_report.pdf" always;
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800 always;
        return 200 '%PDF-1.4 VSP SIEM Report';
    }

    location = /api/v1/siem/report.xlsx {
        add_header Content-Type application/vnd.openxmlformats-officedocument.spreadsheetml.sheet always;
        add_header Content-Disposition "attachment; filename=vsp_siem_report.xlsx" always;
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800 always;
        return 200 'VSP SIEM XLSX Report';
    }

    location /api/v1/network/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8930;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800 always;
    }

    location /api/v1/ndr/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8930;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800 always;
    }

    location = /health/netflow {
        proxy_pass http://127.0.0.1:8930/health;
    }


    location /api/v1/siem/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass       http://127.0.0.1:8931;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/soar/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass       http://127.0.0.1:8931;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/correlation/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass       http://127.0.0.1:8931;
        proxy_set_header Authorization $http_authorization;
    }
    location = /api/v1/cwpp {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass       http://127.0.0.1:8932/api/v1/cwpp;
        proxy_set_header Authorization $http_authorization;
    }
    location /api/v1/cwpp/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass       http://127.0.0.1:8932;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/ueba/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass       http://127.0.0.1:8933;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /auth-validate {
        internal;
        proxy_pass http://127.0.0.1:8921/api/v1/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }
    # ROLE-CHECK endpoints (internal)
    location = /cicd-write-check {
        internal;
        proxy_pass http://127.0.0.1:8960/cicd-write-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =401 /dev/null;
    }
    location = /cicd-read-check {
        internal;
        proxy_pass http://127.0.0.1:8960/cicd-read-check;
        proxy_set_header X-Orig-Method $orig_method;
        proxy_set_header X-Orig-URI $orig_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =401 /dev/null;
    }
    location = /cicd-pipeline-check {
        internal;
        proxy_pass http://127.0.0.1:8960/cicd-pipeline-check;
        proxy_set_header X-Orig-Method $orig_method;
        proxy_set_header X-Orig-URI $orig_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =401 /dev/null;
    }
    location = /analyst-check {
        internal;
        proxy_pass http://127.0.0.1:8960/analyst-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =401 /dev/null;
    }

    # AUTH-GUARD cicd READ — auditor/analyst/admin
    location = /pipeline-write-check {
        internal;
        proxy_pass http://127.0.0.1:8960/pipeline-write-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 =401 /dev/null;
    }
    # AUTH-GUARD SOC write -> admin/analyst
    location ~* ^/api/(p4/ir/incident/create|p4/circia/generate|v1/ueba/analyze)/?$ {
        auth_request /analyst-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # AUTH-GUARD Compliance write -> admin
    location ~* ^/api/(v1/poam/sync|p4/ssdf/assessment|v1/cisa-attestation/forms|p4/zt/assess)/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # AUTH-GUARD CICD write -> admin/dev/analyst
    # ROUND11: bare /vsp/run write -> admin-only (tach khoi nhom 249). reads /vsp/run/* van o r10b
    location ~* ^/api/v1/vsp/run/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location ~* ^/api/(v1/cicd/pr-gate/evaluate|v1/vsp/run|v1/integrations/jira/create)/?$ {
        auth_request /pipeline-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND2: writes -> analyst (policy/remediation-auto/correlation-toggle)
    location ~* ^/api/v1/(policy/rules/[^/]+|remediation/auto|correlation/rules/[^/]+/toggle)/?$ {
        auth_request /analyst-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND2: supply-chain writes -> admin/dev/analyst
    location ~* ^/api/v1/supply-chain/(sign|signatures/[^/]+/verify)/?$ {
        auth_request /pipeline-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND2: p4/vex all methods -> admin/dev/analyst
    location ~* ^/api/p4/vex/?$ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND3: import/users -> admin only
    location ~* ^/api/v1/import/users/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND3: soar secret rotate + cspm account sync -> admin/analyst
    location ~* ^/api/v1/soar/secrets/[^/]+/rotate/?$ {  # ROUND11 admin-only
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location ~* ^/api/v1/cspm/accounts/[^/]+/sync/?$ {
        auth_request /analyst-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ORIG_METHOD_GUARD c1: scan/sandbox/batch/full-soc write -> pipeline-write
    # ROUND5: +/?$ +case-insensitive
    location ~* ^/api/v1/(scan/all-modes|vsp/batch|vsp/run/full-soc|vsp/sandbox/(test-fire|clear))/?$ {
        auth_request /pipeline-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ORIG_METHOD_GUARD c2: audit rotate/repair -> admin only
    # ROUND10B: vsp/run/* reads -> REGEX (khong auto-301 nhu prefix/). Sau 312 (full-soc giu o 312), truoc catch-all. runs:read
    location ~* ^/api/v1/vsp/run/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location ~* ^/api/v1/audit/(rotate|repair)/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND2_GUARD: cac path le chua gated
    location ~* ^/api/v1/cato/toggle/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location ~* ^/api/v1/supply-chain/key/rotate/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location ~* ^/api/v1/import/policies/?$ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location ~* ^/api/v1/security/disclosures/[^/]+/transition/?$ {
        auth_request /analyst-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location /api/v1/agents {
        auth_request /cicd-pipeline-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location /api/v1/autofix/ {
        auth_request /cicd-pipeline-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location /api/v1/remediation/ {
        auth_request /cicd-pipeline-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location /api/v1/schedules/ {
        auth_request /cicd-pipeline-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    # ROUND3_READ: sbom sub-path + supply-chain/sbom + features/soar/config
    location /api/v1/sbom/ {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location = /api/v1/supply-chain/sbom {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location = /api/v1/features/soar/config {
        auth_request /cicd-read-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
    location = /api/v1/cicd/run-history {
        auth_request /cicd-pipeline-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921/api/v1/cicd/run-history;
        add_header Access-Control-Allow-Origin https://vsp.linksafe.vn:30800 always;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
    }

    # AUTH-GUARD cicd GET — analyst/auditor/admin
    # ROUND8: cicd write-paths phai thang prefix pipeline-check (430) o MOI bien the
    location ~* ^/api/v1/cicd/(config/update|task/create|autofix/) {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ~* ^/api/v1/cicd/ {
        auth_request /cicd-pipeline-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AUTH-GUARD cicd POST/PUT/PATCH/DELETE — admin only
    # Đặt TRƯỚC block GET để nginx ưu tiên khi method là write
    location ~* ^/api/v1/cicd/(config/update|task/create|autofix/) {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AUTH-GUARD admin/* — admin only
    location /api/v1/admin/ {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }


    # RATE-LIMIT: auth/login — 5r/m burst=3
    location = /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        add_header X-RateLimit-Limit "5" always;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        error_page 401 = @error401;
        error_page 403 = @error403;
    }

    # RATE-LIMIT: auth/logout
    location = /api/v1/auth/logout {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FIX-03: findings - admin+analyst doc duoc, auditor tuy gateway
    location /api/v1/findings {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        add_header X-RateLimit-Limit "30" always;
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        error_page 401 = @error401;
        error_page 403 = @error403;
    }

    # FIX-04: admin/tenants/plan - chi admin
    location /api/v1/admin/tenants/plan {
        auth_request /cicd-write-check;
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        error_page 401 = @error401;
        error_page 403 = @error403;
    }

    # FIX-05: vsp/scans - analyst duoc, auditor bi block
    location /api/v1/vsp/scans {
        auth_request /analyst-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~* ^/api/v1/vsp/findings/(bulk/(accept|vex)|[^/]+/(accept|vex)) {
        auth_request /analyst-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FIX-P12-cicd-write: cicd write endpoints admin-only (exact/prefix override regex shadow)
    location = /api/v1/cicd/config/update {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /api/v1/cicd/task/create {
        auth_request /cicd-write-check;
        error_page 401 = @error401;
        error_page 403 = @error403;
        proxy_pass http://127.0.0.1:8921;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
